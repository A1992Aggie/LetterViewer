name: Deploy FamilyPhotos to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'FamilyPhotos/**'
      - '.github/workflows/deploy-familyphotos.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish FamilyPhotos
        run: dotnet publish FamilyPhotos/FamilyPhotos.csproj -c Release -o output

      - name: Set base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/LetterViewer/" />|g' output/wwwroot/index.html

      - name: Add .nojekyll
        run: touch output/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp output/wwwroot/index.html output/wwwroot/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
